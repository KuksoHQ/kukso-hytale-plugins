name: Release

on:
  push:
    tags:
      - "kukso-hytale-*-v*"

jobs:
  release:
    runs-on: [self-hosted, hytale]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v4
      - name: Build all release jars
        run: ./gradlew build -Pgame_build=latest
      - name: Upload release jars
        uses: softprops/action-gh-release@v2
        with:
          files: modules/*/build/libs/Kukso*-Hytale-*.jar
      - name: Generate KuksoLib JavaDocs
        if: startsWith(github.ref_name, 'kukso-hytale-lib-v')
        run: ./gradlew :lib:javadoc -Pgame_build=latest
      - name: Checkout website pages
        if: startsWith(github.ref_name, 'kukso-hytale-lib-v')
        uses: actions/checkout@v4
        with:
          repository: KuksoHQ/kuksohq.github.io
          ref: gh-pages
          path: website-pages
          token: ${{ secrets.GH_PAT_PAGES }}
      - name: Publish KuksoLib JavaDocs
        if: startsWith(github.ref_name, 'kukso-hytale-lib-v')
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#kukso-hytale-lib-v}"
          target="website-pages/api/hytale/lib"
          rm -rf "$target/v$version" "$target/latest"
          mkdir -p "$target/v$version" "$target/latest"
          cp -R modules/lib/build/docs/javadoc/. "$target/v$version/"
          cp -R modules/lib/build/docs/javadoc/. "$target/latest/"
          cd website-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api/hytale/lib
          git commit -m "Publish Hytale KuksoLib JavaDocs v$version" || exit 0
          git push
