name: Build

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: [self-hosted, hytale]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew build -Pgame_build=latest
